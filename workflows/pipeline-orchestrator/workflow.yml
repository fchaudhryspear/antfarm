id: pipeline-orchestrator
name: Full SDLC Pipeline Orchestrator v2.0
version: 2.0
workflow_objective: Execute the complete software development lifecycle from feature request to release-ready PR, with tiered routing, human approval gates, backflow loops, and PRD passthrough.
description: |
  v2.0 — Three major upgrades:
  1. TIERED ROUTING: Complexity assessor triages Tier 1/2/3, skips unnecessary phases
  2. BACKFLOW LOOPS: QA failures route back to fix swarm (max 2 cycles)
  3. PRD PASSTHROUGH: All downstream swarms receive prd_path for requirement tracing

  Full pipeline (Tier 3):
  1. Complexity assessment → tier routing
  2. swarm-requirements-v1 → Structured PRD
  3. Human approval gate (PRD review)
  4. swarm-architecture-v1 → Technical architecture
  5. Human approval gate (architecture review)
  6. swarm-implement-v1 → Code on feature branch
  7. swarm-code-review-v3 → Code review findings
  8. swarm-code-fix-v1 → Fixed code + PR
  9. swarm-qa-v1 → QA validation
  10. If QA=NO-GO → back to step 8 (max 2 cycles)
  11. swarm-release-v1 → Deploy + release notes
  12. Final report + retrospective

  Tier 2 skips: architecture, release
  Tier 1 skips: requirements, architecture, release

context:
  feature_request: ""    # REQUIRED: plain-text feature description
  repo_path: ""          # REQUIRED: absolute path to repo
  repo_name: ""          # REQUIRED: short repo name
  branch: ""             # REQUIRED: feature branch name
  auto_approve: "false"  # Set true to skip human gates (CI/testing)
  force_tier: ""         # Override: "1", "2", or "3" to bypass assessor
  notify_channel: ""     # Telegram chat ID for notifications
  exclude_patterns: "_build_artifacts,node_modules,vendor,.venv,__pycache__,dist,build,.next,.git"
  build_cmd: "npm run build 2>/dev/null || python -m py_compile **/*.py 2>/dev/null || true"
  test_cmd: "npm test --passWithNoTests 2>/dev/null || pytest -x -q 2>/dev/null || true"
  max_qa_cycles: "2"     # Maximum QA → Fix backflow loops before escalating
  pipeline_directive: "Orchestrate the SDLC pipeline for {{ repo_path }}. Do NOT fabricate results. Do NOT discuss the workflow, pipeline, agents, or any infrastructure metadata. Exclude: {{ exclude_patterns }}."

definition_of_done:
  - "Code reviewed by swarm-code-review-v3 with overall score ≥ 70"
  - "All review findings addressed (fixed, deferred with justification, or disputed with evidence)"
  - "Unit tests written for all new functions/endpoints"
  - "E2E tests written for critical user flows"
  - "No new regressions (regression-checker status = clean)"
  - "Acceptance criteria ≥ 90% PASS for GO, ≥ 70% for CONDITIONAL"
  - "Security scan passed — no critical or high vulnerabilities unfixed"
  - "Documentation updated (README, API docs, inline comments for complex logic)"
  - "No hardcoded secrets, API keys, or environment-specific values in code"
  - "Performance: no endpoint p99 > 2000ms under load test"
  - "Accessibility: all new UI components have ARIA labels and keyboard navigation"
  - "Tech debt tracked — deferred items filed as issues or documented"
  - "Release notes generated with breaking changes documented"
  - "Deployment readiness report written with rollback procedure"

acceptance_criteria:
  - "Complexity assessment completes in < 60 seconds"
  - "Tier routing correctly skips phases for Tier 1 and Tier 2"
  - "All dispatched sub-workflows complete successfully or with documented partial success"
  - "Human gates fire after requirements and architecture for Tier 3 (unless auto_approve=true)"
  - "PRD path is passed to ALL downstream swarms (implementation, review, fix, QA)"
  - "QA failures trigger backflow to fix swarm (max {{ max_qa_cycles }} cycles)"
  - "Final report includes timing per phase, success metrics, and improvement recommendations"
  - "Feature branch has all implementation + fixes committed"

polling:
  model: ollama-cloud/deepseek-v3.2:cloud
  timeoutSeconds: 64800  # 18 hours max for full pipeline

agents:
  - id: complexity-assessor
    name: Complexity Assessor
    role: triage
    workspace:
      baseDir: agents/complexity-assessor
      files:
        AGENTS.md: agents/complexity-assessor/AGENTS.md
    model: ollama-cloud/glm-5:cloud

  - id: pipeline-controller
    name: Pipeline Controller
    role: orchestrator
    workspace:
      baseDir: agents/pipeline-controller
      files:
        AGENTS.md: agents/pipeline-controller/AGENTS.md
    model: ollama-cloud/deepseek-v3.2:cloud

  - id: gate-keeper
    name: Gate Keeper
    role: gate
    workspace:
      baseDir: agents/gate-keeper
      files:
        AGENTS.md: agents/gate-keeper/AGENTS.md
    model: ollama-cloud/glm-5:cloud

  - id: pipeline-reporter
    name: Pipeline Reporter
    role: reporter
    workspace:
      baseDir: agents/pipeline-reporter
      files:
        AGENTS.md: agents/pipeline-reporter/AGENTS.md
    model: ollama-cloud/qwen3.5:397b-cloud

  - id: retrospective
    name: Retrospective Analyst
    role: analysis
    workspace:
      baseDir: agents/retrospective
      files:
        AGENTS.md: agents/retrospective/AGENTS.md
    model: ollama-cloud/deepseek-v3.2:cloud

steps:
  # ═══════════════════════════════════════════════════════════
  # STEP 0: COMPLEXITY ASSESSMENT (Tiered Routing)
  # ═══════════════════════════════════════════════════════════
  - id: assess-complexity
    agent: complexity-assessor
    timeout_minutes: 25
    expects: 'TIER:'
    timeoutSeconds: 120
    max_retries: 1
    on_fail: escalate_to_human
    input: |
      TASK: {{ task }}
      FEATURE_REQUEST: {{ feature_request }}
      REPO_PATH: {{ repo_path }}
      REPO_NAME: {{ repo_name }}
      FORCE_TIER: {{ force_tier }}

      If FORCE_TIER is set (1, 2, or 3), output that tier immediately without analysis.
      Otherwise, assess the feature request complexity per your AGENTS.md instructions.

      {{ pipeline_directive }}

  # ═══════════════════════════════════════════════════════════
  # STEP 1: REQUIREMENTS (Tier 2+3 only)
  # ═══════════════════════════════════════════════════════════
  - id: dispatch-requirements
    agent: pipeline-controller
    depends_on: [assess-complexity]
    timeout_minutes: 25
    expects: 'REQUIREMENTS_DONE:'
    timeoutSeconds: 6000
    max_retries: 2
    on_fail: escalate_to_human
    input: |
      TASK: {{ task }}
      PHASE: requirements
      REPO_PATH: {{ repo_path }}
      REPO_NAME: {{ repo_name }}
      BRANCH: {{ branch }}
      FEATURE_REQUEST: {{ feature_request }}
      EXCLUDE: {{ exclude_patterns }}

      {{ pipeline_directive }}

      COMPLEXITY ASSESSMENT: {{ steps.assess-complexity.summary }}

      TIER ROUTING:
      If SKIP_PHASES contains "requirements", output:
        REQUIREMENTS_DONE: skipped (Tier 1 — no PRD needed)
        SWARM_STATUS: skipped
      And STOP.

      Otherwise, DISPATCH swarm-requirements-v1:
      Run: node ~/.openclaw/workspace/antfarm/dist/cli/cli.js workflow run swarm-requirements-v1 "Generate PRD for: {{ feature_request }}" --repo-path={{ repo_path }} --context repo_name={{ repo_name }} --context branch={{ branch }} --context feature_request="{{ feature_request }}"

      POLL until complete (every 30s, timeout 5400s).
      EXTRACT: Locate PRD file (typically {{ repo_path }}/docs/prd/*.json or {{ repo_path }}/PRD.md).

      OUTPUT:
      REQUIREMENTS_DONE: prd_path=<absolute path to PRD file>
      SWARM_STATUS: <completed|failed|skipped>
      SWARM_DURATION: <seconds>

  # ═══════════════════════════════════════════════════════════
  # STEP 2: REQUIREMENTS GATE (Tier 3 only)
  # ═══════════════════════════════════════════════════════════
  - id: gate-requirements
    agent: gate-keeper
    depends_on: [dispatch-requirements]
    timeout_minutes: 25
    expects: 'GATE_STATUS:'
    timeoutSeconds: 1800
    max_retries: 2
    on_fail: escalate_to_human
    input: |
      TASK: {{ task }}
      PHASE: requirements-gate
      AUTO_APPROVE: {{ auto_approve }}
      NOTIFY_CHANNEL: {{ notify_channel }}
      REPO_PATH: {{ repo_path }}
      REPO_NAME: {{ repo_name }}

      {{ pipeline_directive }}

      COMPLEXITY: {{ steps.assess-complexity.summary }}
      REQUIREMENTS OUTPUT: {{ steps.dispatch-requirements.summary }}

      If SWARM_STATUS was "skipped", output GATE_STATUS: skipped and STOP.
      If TIER is 1 or 2, output GATE_STATUS: auto-approved (gates only for Tier 3).
      If AUTO_APPROVE=true, output GATE_STATUS: auto-approved.

      Otherwise: Read the PRD file, summarize (max 500 words), output GATE_STATUS: waiting.

  # ═══════════════════════════════════════════════════════════
  # STEP 3: ARCHITECTURE (Tier 3 only)
  # ═══════════════════════════════════════════════════════════
  - id: dispatch-architecture
    agent: pipeline-controller
    depends_on: [gate-requirements]
    timeout_minutes: 25
    expects: 'ARCHITECTURE_DONE:'
    timeoutSeconds: 6000
    max_retries: 2
    on_fail: escalate_to_human
    input: |
      TASK: {{ task }}
      PHASE: architecture
      REPO_PATH: {{ repo_path }}
      REPO_NAME: {{ repo_name }}
      BRANCH: {{ branch }}
      EXCLUDE: {{ exclude_patterns }}

      {{ pipeline_directive }}

      COMPLEXITY: {{ steps.assess-complexity.summary }}
      REQUIREMENTS OUTPUT: {{ steps.dispatch-requirements.summary }}

      TIER ROUTING:
      If SKIP_PHASES contains "architecture", output:
        ARCHITECTURE_DONE: skipped (Tier 1/2 — no architecture phase)
        SWARM_STATUS: skipped
      And STOP.

      Otherwise, extract prd_path from REQUIREMENTS_DONE.
      DISPATCH swarm-architecture-v1:
      Run: node ~/.openclaw/workspace/antfarm/dist/cli/cli.js workflow run swarm-architecture-v1 "Design architecture for: {{ feature_request }}" --repo-path={{ repo_path }} --context repo_name={{ repo_name }} --context branch={{ branch }} --context prd_path=<prd_path>

      POLL until complete (every 30s, timeout 5400s).
      EXTRACT: Locate architecture spec.

      OUTPUT:
      ARCHITECTURE_DONE: arch_path=<path to arch spec>
      SWARM_STATUS: <completed|failed|skipped>
      SWARM_DURATION: <seconds>

  # ═══════════════════════════════════════════════════════════
  # STEP 4: ARCHITECTURE GATE (Tier 3 only)
  # ═══════════════════════════════════════════════════════════
  - id: gate-architecture
    agent: gate-keeper
    depends_on: [dispatch-architecture]
    timeout_minutes: 25
    expects: 'GATE_STATUS:'
    timeoutSeconds: 1800
    max_retries: 2
    on_fail: escalate_to_human
    input: |
      TASK: {{ task }}
      PHASE: architecture-gate
      AUTO_APPROVE: {{ auto_approve }}
      NOTIFY_CHANNEL: {{ notify_channel }}
      REPO_PATH: {{ repo_path }}
      REPO_NAME: {{ repo_name }}

      {{ pipeline_directive }}

      COMPLEXITY: {{ steps.assess-complexity.summary }}
      ARCHITECTURE OUTPUT: {{ steps.dispatch-architecture.summary }}

      If SWARM_STATUS was "skipped", output GATE_STATUS: skipped and STOP.
      If AUTO_APPROVE=true, output GATE_STATUS: auto-approved.

      Otherwise: Read arch spec, summarize (max 500 words), output GATE_STATUS: waiting.

  # ═══════════════════════════════════════════════════════════
  # STEP 5: IMPLEMENTATION (all tiers)
  # PRD PASSTHROUGH: prd_path passed to implement swarm
  # ═══════════════════════════════════════════════════════════
  - id: dispatch-implementation
    agent: pipeline-controller
    depends_on: [gate-architecture]
    timeout_minutes: 25
    expects: 'IMPLEMENTATION_DONE:'
    timeoutSeconds: 6000
    max_retries: 2
    on_fail: escalate_to_human
    input: |
      TASK: {{ task }}
      PHASE: implementation
      REPO_PATH: {{ repo_path }}
      REPO_NAME: {{ repo_name }}
      BRANCH: {{ branch }}
      EXCLUDE: {{ exclude_patterns }}

      {{ pipeline_directive }}

      COMPLEXITY: {{ steps.assess-complexity.summary }}
      REQUIREMENTS OUTPUT: {{ steps.dispatch-requirements.summary }}
      ARCHITECTURE OUTPUT: {{ steps.dispatch-architecture.summary }}

      Extract prd_path from REQUIREMENTS_DONE (may be "skipped" for Tier 1).
      Extract arch_path from ARCHITECTURE_DONE (may be "skipped" for Tier 1/2).

      DISPATCH swarm-implement-v1:
      Run: node ~/.openclaw/workspace/antfarm/dist/cli/cli.js workflow run swarm-implement-v1 "Implement: {{ feature_request }}" --repo-path={{ repo_path }} --context repo_name={{ repo_name }} --context branch={{ branch }} --context prd_path=<prd_path> --context arch_path=<arch_path>

      POLL until complete (every 30s, timeout 5400s).

      OUTPUT:
      IMPLEMENTATION_DONE: branch={{ branch }} commits=<count> prd_path=<prd_path>
      SWARM_STATUS: <completed|failed>
      SWARM_DURATION: <seconds>

  # ═══════════════════════════════════════════════════════════
  # STEP 6: CODE REVIEW (all tiers)
  # PRD PASSTHROUGH: review has access to prd_path for requirement context
  # ═══════════════════════════════════════════════════════════
  - id: dispatch-review
    agent: pipeline-controller
    depends_on: [dispatch-implementation]
    timeout_minutes: 25
    expects: 'REVIEW_DONE:'
    timeoutSeconds: 6000
    max_retries: 2
    on_fail: escalate_to_human
    input: |
      TASK: {{ task }}
      PHASE: review
      REPO_PATH: {{ repo_path }}
      REPO_NAME: {{ repo_name }}
      BRANCH: {{ branch }}
      EXCLUDE: {{ exclude_patterns }}

      {{ pipeline_directive }}

      COMPLEXITY: {{ steps.assess-complexity.summary }}
      IMPLEMENTATION OUTPUT: {{ steps.dispatch-implementation.summary }}

      Extract prd_path from implementation output.

      TIER-AWARE REVIEW MODE:
      If TIER=1, use review_mode=diff-only (only review changed files).
      If TIER=2 or 3, use review_mode=full.

      DISPATCH swarm-code-review-v3:
      Run: node ~/.openclaw/workspace/antfarm/dist/cli/cli.js workflow run swarm-code-review-v3 "Review code on {{ branch }}" --repo-path={{ repo_path }} --context repo_name={{ repo_name }} --context branch={{ branch }} --context review_mode=<full|diff-only> --context prd_path=<prd_path>

      POLL until complete (every 30s, timeout 5400s).

      OUTPUT:
      REVIEW_DONE: findings_path=<path> prd_path=<prd_path>
      FINDINGS_COUNT: <number>
      SWARM_STATUS: <completed|failed>
      SWARM_DURATION: <seconds>

  # ═══════════════════════════════════════════════════════════
  # STEP 7: CODE FIX (all tiers)
  # PRD PASSTHROUGH: fixers have access to original requirements
  # ═══════════════════════════════════════════════════════════
  - id: dispatch-fix
    agent: pipeline-controller
    depends_on: [dispatch-review]
    timeout_minutes: 25
    expects: 'FIX_DONE:'
    timeoutSeconds: 6000
    max_retries: 2
    on_fail: escalate_to_human
    input: |
      TASK: {{ task }}
      PHASE: fix
      REPO_PATH: {{ repo_path }}
      REPO_NAME: {{ repo_name }}
      BRANCH: {{ branch }}
      BUILD_CMD: {{ build_cmd }}
      TEST_CMD: {{ test_cmd }}
      EXCLUDE: {{ exclude_patterns }}

      {{ pipeline_directive }}

      REVIEW OUTPUT: {{ steps.dispatch-review.summary }}

      Extract findings and prd_path from review output.

      DISPATCH swarm-code-fix-v1:
      Run: node ~/.openclaw/workspace/antfarm/dist/cli/cli.js workflow run swarm-code-fix-v1 "Fix findings on {{ branch }}" --repo-path={{ repo_path }} --context repo_name={{ repo_name }} --context branch={{ branch }} --context findings="<findings>" --context prd_path=<prd_path>

      POLL until complete (every 30s, timeout 5400s).

      OUTPUT:
      FIX_DONE: pr_url=<PR URL> prd_path=<prd_path>
      SWARM_STATUS: <completed|failed>
      SWARM_DURATION: <seconds>

  # ═══════════════════════════════════════════════════════════
  # STEP 8: QA VALIDATION (all tiers)
  # PRD PASSTHROUGH: QA validates against original PRD
  # ═══════════════════════════════════════════════════════════
  - id: dispatch-qa
    agent: pipeline-controller
    depends_on: [dispatch-fix]
    timeout_minutes: 25
    expects: 'QA_DONE:'
    timeoutSeconds: 6000
    max_retries: 2
    on_fail: escalate_to_human
    input: |
      TASK: {{ task }}
      PHASE: qa
      REPO_PATH: {{ repo_path }}
      REPO_NAME: {{ repo_name }}
      BRANCH: {{ branch }}
      BUILD_CMD: {{ build_cmd }}
      TEST_CMD: {{ test_cmd }}
      EXCLUDE: {{ exclude_patterns }}
      MAX_QA_CYCLES: {{ max_qa_cycles }}

      {{ pipeline_directive }}

      FIX OUTPUT: {{ steps.dispatch-fix.summary }}

      Extract prd_path from fix output.

      DISPATCH swarm-qa-v1:
      Run: node ~/.openclaw/workspace/antfarm/dist/cli/cli.js workflow run swarm-qa-v1 "QA validation for {{ branch }}" --repo-path={{ repo_path }} --context repo_name={{ repo_name }} --context branch={{ branch }} --context prd_path=<prd_path>

      POLL until complete (every 30s, timeout 5400s).

      EXTRACT QA result. Check GO_NO_GO status.

      ═══ BACKFLOW LOOP LOGIC ═══
      If QA_STATUS=pass (GO or CONDITIONAL): proceed normally.

      If QA_STATUS=fail (NO-GO):
        Check if this is cycle 1 or cycle 2.
        - CYCLE 1: Extract blocking issues from QA report.
          Re-dispatch swarm-code-fix-v1 with QA findings as additional context:
          Run: node ~/.openclaw/workspace/antfarm/dist/cli/cli.js workflow run swarm-code-fix-v1 "Fix QA failures on {{ branch }}" --repo-path={{ repo_path }} --context repo_name={{ repo_name }} --context branch={{ branch }} --context findings="<QA blocking issues>"
          Wait for fix to complete.
          Re-dispatch swarm-qa-v1 with same parameters.
          Wait for QA to complete.
          This is now cycle 2.

        - CYCLE 2 (still NO-GO): Do NOT loop again.
          Output QA_DONE with qa_cycles=2 and escalate.
          The human must review and decide whether to proceed or abort.

      ═══ END BACKFLOW LOGIC ═══

      OUTPUT:
      QA_DONE: qa_report_path=<path> qa_status=<pass|fail> qa_cycles=<1|2>
      QA_STATUS: <passed|failed|partial>
      GO_NO_GO: <GO|NO-GO|CONDITIONAL>
      SWARM_STATUS: <completed|failed>
      SWARM_DURATION: <seconds>

  # ═══════════════════════════════════════════════════════════
  # STEP 9: RELEASE (Tier 3 only, and only if QA passed)
  # ═══════════════════════════════════════════════════════════
  - id: dispatch-release
    agent: pipeline-controller
    depends_on: [dispatch-qa]
    timeout_minutes: 25
    expects: 'RELEASE_DONE:'
    timeoutSeconds: 6000
    max_retries: 2
    on_fail: escalate_to_human
    input: |
      TASK: {{ task }}
      PHASE: release
      REPO_PATH: {{ repo_path }}
      REPO_NAME: {{ repo_name }}
      BRANCH: {{ branch }}
      EXCLUDE: {{ exclude_patterns }}

      {{ pipeline_directive }}

      COMPLEXITY: {{ steps.assess-complexity.summary }}
      QA OUTPUT: {{ steps.dispatch-qa.summary }}

      TIER ROUTING:
      If SKIP_PHASES contains "release", output:
        RELEASE_DONE: skipped (Tier 1/2 — manual release)
        SWARM_STATUS: skipped
      And STOP.

      QA GATE:
      If QA GO_NO_GO is NO-GO after max cycles, output:
        RELEASE_DONE: blocked — QA failed after {{ max_qa_cycles }} cycles
        SWARM_STATUS: blocked
      And STOP.

      Otherwise, DISPATCH swarm-release-v1:
      Run: node ~/.openclaw/workspace/antfarm/dist/cli/cli.js workflow run swarm-release-v1 "Release {{ branch }}" --repo-path={{ repo_path }} --context repo_name={{ repo_name }} --context branch={{ branch }}

      POLL until complete (every 30s, timeout 5400s).

      OUTPUT:
      RELEASE_DONE: readiness=<READY|CONDITIONAL|NOT_READY>
      SWARM_STATUS: <completed|failed|skipped|blocked>
      SWARM_DURATION: <seconds>

  # ═══════════════════════════════════════════════════════════
  # STEP 10: FINAL REPORT
  # ═══════════════════════════════════════════════════════════
  - id: final-report
    agent: pipeline-reporter
    depends_on: [dispatch-release]
    timeout_minutes: 25
    expects: 'PIPELINE_REPORT:'
    timeoutSeconds: 1800
    max_retries: 2
    on_fail: escalate_to_human
    input: |
      TASK: {{ task }}
      REPO_PATH: {{ repo_path }}
      REPO_NAME: {{ repo_name }}
      BRANCH: {{ branch }}
      FEATURE_REQUEST: {{ feature_request }}

      {{ pipeline_directive }}

      PHASE OUTPUTS:
      COMPLEXITY: {{ steps.assess-complexity.summary }}
      REQUIREMENTS: {{ steps.dispatch-requirements.summary }}
      ARCHITECTURE: {{ steps.dispatch-architecture.summary }}
      IMPLEMENTATION: {{ steps.dispatch-implementation.summary }}
      REVIEW: {{ steps.dispatch-review.summary }}
      FIX: {{ steps.dispatch-fix.summary }}
      QA: {{ steps.dispatch-qa.summary }}
      RELEASE: {{ steps.dispatch-release.summary }}

      GATE OUTPUTS:
      REQUIREMENTS_GATE: {{ steps.gate-requirements.summary }}
      ARCHITECTURE_GATE: {{ steps.gate-architecture.summary }}

      Include in the report:
      - Tier classification and phases skipped
      - QA backflow cycles (if any)
      - Timing per phase
      - Overall pipeline duration
      - PRD traceability (was prd_path passed to all downstream swarms?)

      Write report to {{ repo_path }}/docs/pipeline-report-$(date +%Y-%m-%d).md

  # ═══════════════════════════════════════════════════════════
  # STEP 11: RETROSPECTIVE
  # ═══════════════════════════════════════════════════════════
  - id: retrospective
    agent: retrospective
    depends_on: [final-report]
    timeout_minutes: 25
    expects: 'RETRO_STATUS:'
    timeoutSeconds: 1800
    max_retries: 2
    on_fail: escalate_to_human
    input: |
      TASK: {{ task }}
      REPO_PATH: {{ repo_path }}
      REPO_NAME: {{ repo_name }}
      BRANCH: {{ branch }}
      FEATURE_REQUEST: {{ feature_request }}

      {{ pipeline_directive }}

      PIPELINE REPORT: {{ steps.final-report.summary }}

      ALL PHASE OUTPUTS:
      COMPLEXITY: {{ steps.assess-complexity.summary }}
      REQUIREMENTS: {{ steps.dispatch-requirements.summary }}
      ARCHITECTURE: {{ steps.dispatch-architecture.summary }}
      IMPLEMENTATION: {{ steps.dispatch-implementation.summary }}
      REVIEW: {{ steps.dispatch-review.summary }}
      FIX: {{ steps.dispatch-fix.summary }}
      QA: {{ steps.dispatch-qa.summary }}
      RELEASE: {{ steps.dispatch-release.summary }}

      Additional analysis for v2.0:
      - Was tier classification accurate? Would a different tier have been better?
      - Did QA backflow loops occur? If so, what caused the initial failure?
      - Was PRD context preserved through the pipeline or diluted?
      - Recommendations for tier thresholds, backflow limits, and phase timeouts.

      Write to {{ repo_path }}/docs/retrospectives/$(date +%Y-%m-%d)-{{ branch }}.md

hooks:
  onSuccess:
    - run: echo "[pipeline-orchestrator v2.0] ✅ SDLC pipeline completed for {{ repo_name }} on {{ branch }}"
    - run: echo "[pipeline-orchestrator v2.0] Tier: {{ steps.assess-complexity.summary }} | QA: {{ steps.dispatch-qa.summary }}"
  onFailure:
    - run: echo "[pipeline-orchestrator v2.0] ❌ Pipeline FAILED for {{ repo_name }} on {{ branch }}"
    - run: echo "[pipeline-orchestrator v2.0] Failed at step: ${FAILED_STEP:-unknown}"
