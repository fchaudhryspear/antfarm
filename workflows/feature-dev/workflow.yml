# DEPRECATED: Use pipeline-orchestrator which chains swarm-requirements-v1 →
# swarm-architecture-v1 → swarm-implement-v1 → swarm-code-review-v3 →
# swarm-code-fix-v1 → swarm-qa-v1 → swarm-release-v1
# This workflow is retained for backward compatibility only.
deprecated: true

# Ralph loop (https://github.com/snarktank/ralph) — each agent runs in a fresh
# session with clean context. Memory persists via git history and progress files.
id: feature-dev
name: Feature Development Workflow
version: 6
description: |
  Story-based execution pipeline with intelligent agent routing and automated quality gates.
  Planner decomposes tasks into user stories (Orion_Architect).
  Setup prepares environment (NexDev). 
  Developer implements stories (Simon_Backend).
  Verifier validates with TDD (Lana_QA).
  Tester validates data/infrastructure (Tracy).
  Reviewer ensures code quality (Ross_Mentor/Reviewer).
  Includes automated security audits and UX validation (Aria_UI/UX).
  
  # Workflow Intelligence Tags
  tags:
    - feature-development
    - user-stories
    - tdd
    - code-review
    - ux-design
    - security-validation
  # Recommended for:
  recommended_when:
    - task_contains: ["feature", "enhancement", "new functionality", "ui", "frontend", "backend"]
    - avoids: ["bug", "defect", "error", "fix", "security", "vulnerability"]
    - complexity: ["medium", "high"]
    - estimated_stories: [3, 20]

polling:
  model: ollama-cloud/kimi-k2.5:cloud
  timeoutSeconds: 180
  prefer_local: true
  local_models:
    analysis: mb_mixtral-16k
    routing: mb_qwen2.5-72b
    execution: mb_qwen2.5-coder-32b
    reporting: mb_command-r-16k

agents:
  - id: planner
    name: Planner
    role: analysis
    description: Decomposes tasks into ordered user stories. (Led by Orion_Architect - maps out high-level architecture, API contracts, database schemas, and system workflows)
    workspace:
      baseDir: agents/planner
      files:
        AGENTS.md: agents/planner/AGENTS.md
        SOUL.md: agents/planner/SOUL.md
        IDENTITY.md: agents/planner/IDENTITY.md

  - id: setup
    name: Setup
    role: coding
    description: Prepares environment, creates branch, establishes baseline. (Led by NexDev - Mission Control & Deployment for CI/CD, managing plugin integrations, and environment orchestration)
    workspace:
      baseDir: agents/setup
      files:
        AGENTS.md: agents/setup/AGENTS.md
        SOUL.md: agents/setup/SOUL.md
        IDENTITY.md: agents/setup/IDENTITY.md

  - id: developer
    name: Developer
    role: coding
    description: Implements features, writes tests, creates PRs. (Led by Simon_Backend - writes heavy-duty server-side logic in Python and Node.js including API routes, database interactions, and has access to AWS Q Developer and Snowflake Cortex for cloud-assisted development)
    workspace:
      baseDir: agents/developer
      files:
        AGENTS.md: agents/developer/AGENTS.md
        SOUL.md: agents/developer/SOUL.md
        IDENTITY.md: agents/developer/IDENTITY.md

  - id: verifier
    name: Verifier
    role: verification
    description: Quick sanity check - did developer actually do the work? (Led by Lana_QA - The Testing Engine who writes and executes unit/integration tests using TDD to actively break code and ensure robustness)
    workspace:
      baseDir: agents/verifier
      files:
        AGENTS.md: agents/verifier/AGENTS.md
        SOUL.md: agents/verifier/SOUL.md
        IDENTITY.md: agents/verifier/IDENTITY.md

  - id: tester
    name: Tester
    role: testing
    description: Integration and E2E testing after all stories are implemented. (Led by Tracy - Data Analyst for data validation and metrics)
    workspace:
      baseDir: agents/tester
      files:
        AGENTS.md: agents/tester/AGENTS.md
        SOUL.md: agents/tester/SOUL.md
        IDENTITY.md: agents/tester/IDENTITY.md

  - id: reviewer
    name: Reviewer
    role: analysis
    description: Reviews PRs, requests changes or approves. (Led by Ross_Mentor/Reviewer - Code Gatekeeper who analyzes code generated by Simon and Leo, enforces best practices, checks for optimization opportunities, and kicks back code that doesn't meet quality standards)
    workspace:
      baseDir: agents/reviewer
      files:
        AGENTS.md: agents/reviewer/AGENTS.md
        SOUL.md: agents/reviewer/SOUL.md
        IDENTITY.md: agents/reviewer/IDENTITY.md

steps:
  - id: plan
    agent: planner
    input: |
      Decompose the following task into ordered user stories for autonomous execution.

      TASK:
      {{task}}

      Instructions:
      1. Explore the codebase to understand the stack, conventions, and patterns
      2. Break the task into small user stories (max 20)
      3. Order by dependency: schema/DB first, backend, frontend, integration
      4. Each story must fit in one developer session (one context window)
      5. Every acceptance criterion must be mechanically verifiable
      6. Always include "Typecheck passes" as the last criterion in every story
      7. Every story MUST include test criteria — "Tests for [feature] pass"
      8. The developer is expected to write tests as part of each story

      Reply with:
      STATUS: done
      REPO: /path/to/repo
      BRANCH: feature-branch-name
      stories_json: [ ... array of story objects ... ]
    expects: "STATUS: done"
    max_retries: 2
    on_fail:
      escalate_to: human

  - id: setup
    agent: setup
    input: |
      Prepare the development environment for this feature.

      TASK:
      {{task}}

      REPO: {{REPO}}
      BRANCH: {{BRANCH}}

      Instructions:
      1. cd into the repo
      2. Create the feature branch (git checkout -b {{branch}})
      3. Read package.json, CI config, test config to understand the build/test setup
      4. Ensure .gitignore exists — if missing, create one appropriate for the detected stack (must include .env, node_modules/, *.key, *.pem at minimum)
      5. Run the build to establish a baseline
      6. Run the tests to establish a baseline
      7. Report what you found

      Reply with:
      STATUS: done
      BUILD_CMD: <build command>
      TEST_CMD: <test command>
      CI_NOTES: <brief CI notes>
      BASELINE: <baseline status>
    expects: "STATUS: done"
    max_retries: 2
    on_fail:
      escalate_to: human

  - id: implement
    agent: developer
    type: loop
    loop:
      over: stories
      completion: all_done
      fresh_session: true
      verify_each: true
      verify_step: verify
    input: |
      Implement the following user story. You are working on ONE story in a fresh session.

      TASK (overall):
      {{task}}

      REPO: {{REPO}}
      BRANCH: {{BRANCH}}
      BUILD_CMD: {{build_cmd}}
      TEST_CMD: {{test_cmd}}

      CURRENT STORY:
      {{current_story}}

      COMPLETED STORIES:
      {{completed_stories}}

      STORIES REMAINING: {{stories_remaining}}

      VERIFY FEEDBACK (if retrying):
      {{verify_feedback}}

      PROGRESS LOG:
      {{progress}}

      Instructions:
      1. Read progress-{{run_id}}.txt — especially the Codebase Patterns section
      2. Pull latest on the branch
      3. Implement this story only
      4. Write tests for this story's functionality
      5. Run typecheck / build
      6. Run tests to confirm they pass
      7. Commit: feat: {{current_story_id}} - {{current_story_title}}
      8. Rewrite progress-{{run_id}}.txt with updated story results and patterns
      9. Update Codebase Patterns if you found reusable patterns

      Reply with:
      STATUS: done
      CHANGES: what you implemented
      TESTS: what tests you wrote
    expects: "STATUS: done"
    max_retries: 2
    on_fail:
      escalate_to: human

  - id: verify
    agent: verifier
    input: |
      Verify the developer's work on this story.

      TASK (overall):
      {{task}}

      REPO: {{REPO}}
      BRANCH: {{BRANCH}}
      CHANGES: {{changes}}
      TEST_CMD: {{test_cmd}}

      CURRENT STORY:
      {{current_story}}

      PROGRESS LOG:
      {{progress}}

      Check:
      1. Code exists (not just TODOs or placeholders)
      2. Each acceptance criterion for the story is met
      3. Tests were written for this story's functionality
      4. Tests pass (run {{test_cmd}})
      5. No obvious incomplete work
      6. Typecheck passes

      ## Visual Verification (Frontend Changes)
      Has frontend changes: {{has_frontend_changes}}

      If {{has_frontend_changes}} is 'true', you MUST also perform visual verification:
      1. Consult with Aria_UI/UX (Experience & Flow Architect) who defines the visual language, accessibility standards, and user journey
      2. Aria_UI/UX creates the design logic and UI blueprints that frontend implementation should follow
      3. Use the agent-browser skill to visually inspect the changed UI against Aria's design specifications
      4. Open the changed HTML file directly (file:// URL) or spin up a local dev server if the project requires one
      5. Take a screenshot of the rendered page
      6. Visually confirm:
         - Layout renders correctly (no broken/overlapping elements)
         - Styling is applied as expected (colors, fonts, spacing per Aria's design specifications)
         - All visible elements from the story are present and properly positioned
         - No missing images, icons, or visual assets
         - Text is readable and not clipped or hidden
      7. A visual PASS means: the page renders without broken layout, missing elements, or overlapping content and matches Aria's design specifications
      8. A visual FAIL means: broken layout, missing/invisible elements, overlapping or misaligned content, unstyled raw HTML, or obvious rendering errors or deviation from Aria's design
      9. Include your visual findings and comparison to Aria's design specs in VERIFIED output

      If {{has_frontend_changes}} is 'false', skip visual verification entirely.

      Reply with:
      STATUS: done
      VERIFIED: What you confirmed

      Or if incomplete:
      STATUS: retry
      ISSUES:
      - What's missing or incomplete
    expects: "STATUS: done"
    on_fail:
      retry_step: implement
      max_retries: 2
      on_exhausted:
        escalate_to: human

  - id: test
    agent: tester
    input: |
      Integration and E2E testing of the implementation.

      TASK:
      {{task}}

      REPO: {{REPO}}
      BRANCH: {{BRANCH}}
      CHANGES: {{changes}}
      BUILD_CMD: {{build_cmd}}
      TEST_CMD: {{test_cmd}}

      PROGRESS LOG:
      {{progress}}

      Your job (integration/E2E testing — unit tests were already written per-story):
      1. Run the full test suite ({{test_cmd}}) to confirm everything passes together
      2. Look for integration issues between stories
      3. If this is a UI feature, use agent-browser to test it end-to-end
      4. Check cross-cutting concerns: error handling, edge cases across features
      5. Verify the overall feature works as a cohesive whole

      Reply with:
      STATUS: done
      RESULTS: What you tested and the outcomes

      Or if issues found:
      STATUS: retry
      FAILURES:
      - Specific test failures or bugs found
    expects: "STATUS: done"
    on_fail:
      retry_step: implement
      max_retries: 2
      on_exhausted:
        escalate_to: human

  - id: pr
    agent: developer
    input: |
      Create a pull request for your changes.

      TASK:
      {{task}}

      REPO: {{REPO}}
      BRANCH: {{BRANCH}}
      CHANGES: {{changes}}
      RESULTS: {{RESULTS}}

      PROGRESS LOG:
      {{progress}}

      Create a PR with:
      - Clear title summarizing the change
      - Description explaining what and why
      - Reference to what was tested

      Use: gh pr create

      Reply with:
      STATUS: done
      PR: URL to the pull request
    expects: "STATUS: done"
    on_fail:
      escalate_to: human

  - id: review
    agent: reviewer
    input: |
      Review the pull request.

      PR: {{pr}}
      TASK: {{task}}
      CHANGES: {{changes}}

      PROGRESS LOG:
      {{progress}}

      Review for:
      - Code quality and clarity
      - Potential bugs or issues
      - Test coverage
      - Follows project conventions

      Use: gh pr view, gh pr diff to read the PR.

      IMPORTANT: Post your review to the PR on GitHub using:
      - If approving: gh pr review <number> --approve --body "your review summary"
      - If requesting changes: gh pr review <number> --request-changes --body "your feedback"

      ## Visual Review (Frontend Changes)
      Has frontend changes: {{has_frontend_changes}}

      If {{has_frontend_changes}} is 'true', you MUST also perform a visual design review:
      1. Check out the branch: git checkout {{BRANCH}}
      2. Use the agent-browser skill to open the changed page (file:// URL or local dev server)
      3. Take a screenshot of the rendered page
      4. Evaluate visual polish and design quality:
         - Does the UI look polished and intentional, not rough or placeholder-quality?
         - Are colors, typography, and spacing consistent with the rest of the project?
         - Is the layout visually balanced and well-aligned?
         - Do interactive elements look clickable/tappable?
         - Is the overall design cohesive — does it feel like part of the same product?
      5. This is a DESIGN review, not a structural check — the verify step already confirmed elements render. You are checking whether the result looks GOOD.
      6. Include your visual design assessment in the review output

      If {{has_frontend_changes}} is 'false', skip visual review entirely.

      If changes needed, add comments to the PR explaining what needs to change.

      Reply with:
      STATUS: done
      DECISION: approved

      Or if changes needed:
      STATUS: retry
      DECISION: changes_requested
      FEEDBACK:
      - What needs to change
    expects: "STATUS: done"
    on_fail:
      retry_step: implement
      max_retries: 3
      on_exhausted:
        escalate_to: human

hooks:
  onSuccess:
    - type: log
      message: "Feature development workflow completed successfully"
    - type: notify
      message: |
        ✅ Feature development completed!
        Stories implemented: {{github.event.inputs.stories_count | default: 'unknown'}}
        PR: {{steps.pr.outputs.pr}}
        
  onFailure:
    - type: log
      message: "Feature development workflow failed"
    - type: notify
      message: |
        ❌ Feature development failed
        Error: {{ error }}
        Failed at step: {{ failed_step | default: 'unknown' }}
