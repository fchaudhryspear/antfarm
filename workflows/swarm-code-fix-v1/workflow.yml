steps:
  - id: setup
    agent: setup
    timeout_minutes: 30
    expects: 'SETUP_OK:'
    timeoutSeconds: 300
    max_retries: 2
    input: |
      TASK: {{ task }}
      REPO_PATH: {{ repo_path }}
      REPO_NAME: {{ repo_name }}
      BRANCH: {{ branch }}
      EXCLUDE: {{ exclude_patterns }}
      ALL_FINDINGS: {{ findings }}

      {{ fix_directive }}

      Perform setup only.

      Required actions:
      1. Confirm {{ repo_path }} exists and is a git repo.
      2. Checkout or create branch {{ branch }}.
      3. Detect shared file paths mentioned in ALL_FINDINGS, if any.
      4. Detect whether ALL_FINDINGS is json or freetext.

      Do not classify findings into domain sections here.
      Do not review code.
      Do not fix anything.

      Output format:
        SETUP_OK: branch={{ branch }} repo={{ repo_path }}
        SHARED_FILES: file1.py (security+backend), file2.ts (frontend+ux), ...
        If no shared files: SHARED_FILES: none
        FINDINGS_FORMAT: json | freetext
        FINDING_OWNER_MAP: {}

  - id: fix-code-quality
    agent: fix-code-quality
    depends_on: [setup]
    timeout_minutes: 30
    expects: 'STATUS:'
    timeoutSeconds: 3600
    max_retries: 2
    input: |
      TASK: {{ task }}
      REPO_PATH: {{ repo_path }}
      REPO_NAME: {{ repo_name }}
      BRANCH: {{ branch }}
      BUILD_CMD: {{ build_cmd }}
      TEST_CMD: {{ test_cmd }}
      EXCLUDE: {{ exclude_patterns }}
      MAX_FIXES: {{ max_fixes_per_domain }}
      PRIORITY: {{ priority }}

      {{ fix_directive }}

      CROSS_DOMAIN_CONTEXT (read-only — do NOT fix these, just be aware):
      {{ findings }}
      SHARED_FILES (appear in multiple domains — edit minimally): {{ steps.setup.summary }}

      YOUR DOMAIN FINDINGS (code-quality only — fix these):
      Extract CODE_QUALITY_FINDINGS section from: {{ steps.setup.summary }}

      Apply PRIORITY filter to these pre-filtered findings:
      - all (default): fix all severities
      - high-and-above: fix high + critical, skip medium/low
      - high: fix high + critical only (synonym for high-and-above, explicit)
      - critical-only: fix only critical findings
      Skip anything below your priority threshold — do NOT defer it, just skip it.
      Fix the top {{ max_fixes_per_domain }} matching findings.
      Before editing any SHARED_FILE, check git log to see if another fixer already touched it.
      If no code-quality findings match, output STATUS: skipped — no findings for this domain.

  - id: fix-security
