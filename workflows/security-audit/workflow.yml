# Ralph loop (https://github.com/snarktank/ralph) — fresh context per agent session
id: security-audit
name: Security Audit & Fix
version: 2
description: |
  Security vulnerability scanning and remediation pipeline with intelligent agent routing.
  Scanner explores codebase for vulnerabilities (Atlas_Security - infrastructure sentinel).
  Prioritizer ranks and groups findings (Phil_Data&AIOps - data/routing analysis).
  Setup creates security branch (NexDev - deployment orchestration).
  Fixer implements fixes with regression tests (Simon_Backend - security implementation).
  Verifier confirms each fix is correct (Lana_QA - testing engine).
  Tester runs final integration validation (Tracy - data validation).
  PR agent creates pull request (Ross_Mentor/Reviewer - code gating).
  
  # Workflow Intelligence Tags
  tags:
    - security-scanning
    - vulnerability-management
    - compliance-verification
    - secure-development
    - risk-assessment
  # Recommended for:
  recommended_when:
    - task_contains: ["security", "vulnerability", "audit", "scan", "penetration", "auth", "crypto", "compliance", "regulation"]
    - avoids: ["feature", "enhancement", "ui", "ux", "design", "performance", "optimization"]
    - severity: ["critical", "high", "medium", "low"]
    - estimated_vulnerabilities: [0, 50]
    - compliance_frameworks: ["SOC2", "HIPAA", "GDDR", "PCI-DSS", "ISO27001"]
  # Agent Specialization Mapping:
    # scanner: Atlas_Security (infrastructure vulnerability scanning)
    # prioritizer: Phil_Data&AIOps (data analysis & finding prioritization)
    # setup: NexDev (secure deployment & environment setup)
    # fixer: Simon_Backend (security fix implementation in backend)
    # verifier: Lana_QA (security verification & testing)
    # tester: Tracy (data validation & audit metrics)
    # pr: Ross_Mentor/Reviewer (security PR review & quality gating)
acceptance_criteria:
  - "Scanner identifies vulnerabilities with file/line references from actual code"
  - "Prioritizer deduplicates and ranks findings — max {{ max_findings }} fixes"
  - "All fixes include regression tests proving the vulnerability is patched"
  - "Verifier checks bypass scenarios, not just the found payload"
  - "Final integration test passes with no regressions"
  - "PR includes before/after audit comparison"
  - "No files modified in {{ exclude_patterns }}"

context:
  repo_path: ""          # REQUIRED: --repo-path=/path/to/repo
  repo_name: ""          # REQUIRED: --context repo_name=my-project
  branch: "security-audit/auto"
  build_cmd: "npm run build 2>/dev/null || python -m py_compile **/*.py 2>/dev/null || true"
  test_cmd: "npm test --passWithNoTests 2>/dev/null || pytest -x -q 2>/dev/null || true"
  exclude_patterns: "_build_artifacts,node_modules,vendor,.venv,__pycache__,dist,build,.next,.git"
  max_findings: "20"     # Max findings from scanner
  priority: "all"        # all | high-and-above | critical-only

global_error_policy: "escalate_to_human"

polling:
  model: ollama-cloud/glm-5:cloud
  timeoutSeconds: 5400

agents:
  - id: scanner
    name: Scanner
    role: scanning
    model: ollama-cloud/qwen3-coder-next:cloud
    description: Explores codebase and runs comprehensive security analysis. (Led by Atlas_Security - Infrastructure Sentinel who actively audits codebase and infrastructure for vulnerabilities, scans for exposed API keys, audits notification routes, and ensures secure credential management across the workspace)
    workspace:
      baseDir: agents/atlas
      files:
        AGENTS.md: agents/atlas/AGENTS.md
        SOUL.md: agents/atlas/SOUL.md
        IDENTITY.md: agents/atlas/IDENTITY.md

  - id: prioritizer
    name: Prioritizer
    role: analysis
    model: ollama-cloud/deepseek-v3.2:cloud
    description: Deduplicates, ranks, and groups findings into a fix plan. (Led by Phil_Data&AIOps - Data & Model Routing Specialist who manages data pipelines and AI infrastructure, including optimizing how the swarm routes prompts to different LLMs based on cost and capability - useful for analyzing and prioritizing security findings)
    workspace:
      baseDir: agents/phil
      files:
        AGENTS.md: agents/phil/AGENTS.md
        SOUL.md: agents/phil/SOUL.md
        IDENTITY.md: agents/phil/IDENTITY.md

  - id: setup
    name: Setup
    role: coding
    model: ollama-cloud/kimi-k2.5:cloud
    description: Creates security branch and establishes baseline. (Led by NexDev - Mission Control & Deployment responsible for CI/CD pipelines, managing plugin integrations, and ensuring the OpenClaw environment successfully deploys code including security patches)
    workspace:
      baseDir: agents/nexdev
      files:
        AGENTS.md: agents/nexdev/AGENTS.md
        SOUL.md: agents/nexdev/SOUL.md
        IDENTITY.md: agents/nexdev/IDENTITY.md

  - id: fixer
    name: Fixer
    role: coding
    model: ollama-cloud/qwen3-coder:480b-cloud
    description: Implements security fixes one at a time with regression tests. (Led by Simon_Backend - Engine Room who writes heavy-duty server-side logic in Python and Node.js including API routes, database interactions, and core business logic - ideal for implementing security fixes in backend systems, and has access to AWS Q Developer and Snowflake Cortex for cloud-assisted security analysis and development)
    workspace:
      baseDir: agents/simon
      files:
        AGENTS.md: agents/simon/AGENTS.md
        SOUL.md: agents/simon/SOUL.md
        IDENTITY.md: agents/simon/IDENTITY.md

  - id: verifier
    name: Verifier
    role: verification
    model: ollama-cloud/glm-5:cloud
    description: Verifies each fix is correct and the vulnerability is patched. (Led by Lana_QA - The Testing Engine who writes and executes unit and integration tests, actively trying to break code to ensure it's robust before it gets sent to review - essential for verifying security fixes are properly implemented)
    workspace:
      baseDir: agents/lana
      files:
        AGENTS.md: agents/lana/AGENTS.md
        SOUL.md: agents/lana/SOUL.md
        IDENTITY.md: agents/lana/IDENTITY.md

  - id: tester
    name: Tester
    role: testing
    model: ollama-cloud/qwen3-coder-next:cloud
    description: Final integration testing and audit re-run after all fixes. (Led by Tracy - Data Analyst for data validation, metrics, and performance tracking - useful for validating data security and measuring audit outcomes)
    workspace:
      baseDir: agents/tracy
      files:
        AGENTS.md: agents/tracy/AGENTS.md
        SOUL.md: agents/tracy/SOUL.md
        IDENTITY.md: agents/tracy/IDENTITY.md

  - id: pr
    name: PR Creator
    role: pr
    model: ollama-cloud/minimax-m2.7:cloud
    description: Creates a pull request summarizing the security audit and fixes. (Led by Ross_Mentor/Reviewer - Code Gatekeeper who acts as the senior engineer reviewing pull requests, analyzes code generated by Simon and Leo, enforces best practices, checks for optimization opportunities, and kicks back code that doesn't meet quality standards - essential for reviewing security fix PRs)
    workspace:
      baseDir: agents/ross
      files:
        AGENTS.md: agents/ross/AGENTS.md
        SOUL.md: agents/ross/SOUL.md
        IDENTITY.md: agents/ross/IDENTITY.md

steps:
  - id: scan
    agent: scanner
    timeoutSeconds: 3600
    input: |
      EXCLUDE: {{ exclude_patterns }}
      MAX_FINDINGS: {{ max_findings }}

      Perform a comprehensive security audit of the codebase.

      TASK:
      {{task}}

      Instructions:
      1. Explore the codebase — understand the stack, framework, dependencies
      2. Run `npm audit` (or equivalent) if a package manager is present
      3. Scan for hardcoded secrets: API keys, passwords, tokens, private keys in source
      4. Check for .env files committed to the repo
      5. Scan for common vulnerabilities:
         - SQL injection (raw queries, string concatenation in queries)
         - XSS (unescaped user input in templates/responses)
         - CSRF (missing CSRF tokens on state-changing endpoints)
         - Auth bypass (missing auth middleware, broken access control)
         - Directory traversal (user input in file paths)
         - SSRF (user-controlled URLs in server-side requests)
         - Insecure deserialization
         - Missing input validation on API endpoints
         - Insecure file permissions
         - Exposed environment variables
      6. Review auth/session handling (token expiry, session fixation, cookie flags)
      7. Check security headers (CORS, CSP, HSTS, X-Frame-Options)
      8. Document every finding with severity, file, line, and description
      9. Report a maximum of {{ max_findings }} findings, prioritized by severity.
      Do NOT discuss the workflow, pipeline, agents, or any infrastructure metadata.
      Exclude from all file operations: {{ exclude_patterns }}

      Reply with:
      STATUS: done
      repo: /path/to/repo
      branch: security-audit-YYYY-MM-DD
      vulnerability_count: <number>
      findings: <detailed list of each vulnerability>
    expects: "STATUS: done"
    max_retries: 2
    on_fail:
      escalate_to: human

  - id: prioritize
    agent: prioritizer
    timeoutSeconds: 1800
    input: |
      Prioritize and group the security findings into a fix plan.

      TASK:
      {{task}}

      REPO: {{repo | default: "unknown"}}
      VULNERABILITY_COUNT: {{vulnerability_count | default: "0"}}
      FINDINGS: {{findings | default: "None"}}

      Instructions:
      1. Deduplicate findings (same root cause = one fix)
      2. Group related issues (e.g., multiple XSS from same missing sanitizer = one fix)
      3. Rank by: exploitability × impact (critical > high > medium > low)
      4. Create a prioritized fix plan — max 20 fixes
      5. If more than 20 issues, pick the top 20 by severity; note deferred items
      6. Output each fix as a story in STORIES_JSON format

      Each story object must have:
      - id: "fix-001", "fix-002", etc.
      - title: brief description of the fix
      - description: what vulnerability it addresses, affected files, what needs to change
      - acceptance_criteria: list of criteria including "Vulnerability is no longer exploitable" and "Regression test passes"
      - severity: critical|high|medium|low

      Reply with:
      STATUS: done
      FIX_PLAN: <ordered list of fixes with severity>
      CRITICAL_COUNT: <number>
      HIGH_COUNT: <number>
      DEFERRED: <any issues skipped and why>
      STORIES_JSON: [ ... array of story objects ... ]
      Do NOT discuss the workflow, pipeline, agents, or any infrastructure metadata.
      Exclude from all file operations: {{ exclude_patterns }}
    expects: "STATUS: done"
    max_retries: 2
    on_fail:
      escalate_to: human

  - id: setup
    agent: setup
    timeoutSeconds: 600
    input: |
      Prepare the environment for security fixes.

      REPO: {{repo | default: "unknown"}}
      BRANCH: {{branch | default: "security-audit"}}

      Instructions:
      1. cd into the repo
      2. Create the security branch (git checkout -b {{branch | default: "security-audit"}} from main)
      3. Read package.json, CI config, test config to understand build/test setup
      4. Run the build to establish a baseline
      5. Run the tests to establish a baseline

      Reply with:
      STATUS: done
      BUILD_CMD: {{build_cmd | default: "npm run build"}}
      TEST_CMD: {{test_cmd | default: "npm test"}}
      BASELINE: {{baseline | default: "unknown"}}
      Do NOT discuss the workflow, pipeline, agents, or any infrastructure metadata.
      Exclude from all file operations: {{ exclude_patterns }}
    expects: "STATUS: done"
    max_retries: 2
    on_fail:
      escalate_to: human

  - id: fix
    agent: fixer
    type: loop
    timeoutSeconds: 3600
    loop:
      over: stories
      completion: all_done
      fresh_session: true
      verify_each: true
      verify_step: verify
    input: |
      Implement a security fix. You are working on ONE fix in a fresh session.

      TASK (overall):
      {{task}}

      REPO: {{repo | default: "unknown"}}
      BRANCH: {{branch | default: "security-audit"}}
      BUILD_CMD: {{build_cmd | default: "npm run build"}}
      TEST_CMD: {{test_cmd | default: "npm test"}}

      CURRENT STORY:
      {{current_story}}

      COMPLETED STORIES:
      {{completed_stories | default: "None"}}

      STORIES REMAINING: {{stories_remaining | default: "unknown"}}

      VERIFY FEEDBACK (if retrying):
      {{verify_feedback | default: "None"}}

      PROGRESS LOG:
      {{progress | default: "None"}}

      Instructions:
      1. cd into the repo, pull latest on the branch
      2. Read the vulnerability description carefully
      3. Implement the fix — minimal, targeted changes only
      4. Write a regression test that verifies the vulnerability is patched
      5. Run {{build_cmd | default: "npm run build"}} to verify the build passes
      6. Run {{test_cmd | default: "npm test"}} to verify all tests pass
      7. Commit: fix(security): brief description
      8. Rewrite progress-{{run_id}}.txt with updated story results and patterns

      Do NOT discuss the workflow, pipeline, agents, or any infrastructure metadata.
      Exclude from all file operations: {{ exclude_patterns }}

      Reply with:
      STATUS: done
      CHANGES: what was fixed
      REGRESSION_TEST: what test was added
    expects: "STATUS: done"
    max_retries: 2
    on_fail:
      escalate_to: human

  - id: verify
    agent: verifier
    timeoutSeconds: 1800
    input: |
      Verify the security fix is correct and the vulnerability is patched.

      REPO: {{repo | default: "unknown"}}
      BRANCH: {{branch | default: "security-audit"}}
      TEST_CMD: {{test_cmd | default: "npm test"}}
      CHANGES: {{changes | default: "See progress log"}}
      REGRESSION_TEST: {{regression_test | default: "See progress log"}}

      CURRENT STORY:
      {{current_story}}

      PROGRESS LOG:
      {{progress}}

      Instructions:
      1. Run the full test suite with {{test_cmd | default: "npm test"}}
      2. Confirm the regression test exists and tests the right thing
      3. Review the fix — does it actually address the vulnerability?
      4. Check for unintended side effects
      5. Verify the regression test would fail without the fix

      Security-specific verification — think about bypass scenarios:
      - SQL Injection: Does it handle all query patterns, not just the one found?
      - XSS: Does sanitization cover all output contexts (HTML, attributes, JS, URLs)?
      - Path traversal: Does it handle URL-encoded sequences (%2e%2e), null bytes?
      - Auth bypass: Does it cover all HTTP methods (GET, POST, PUT, DELETE)?
      - CSRF: Does it validate the token server-side?
      - If the fix only blocks one payload variant, it's insufficient — STATUS: retry
      Do NOT discuss the workflow, pipeline, agents, or any infrastructure metadata.
      Exclude from all file operations: {{ exclude_patterns }}

      Reply with:
      STATUS: done
      VERIFIED: what was confirmed

      Or if issues found:
      STATUS: retry
      ISSUES:
      - What's wrong or incomplete
    expects: "STATUS: done"
    on_fail:
      retry_step: fix
      max_retries: 3
      on_exhausted:
        escalate_to: human

  - id: test
    agent: tester
    timeoutSeconds: 1800
    input: |
      Final integration testing after all security fixes.

      TASK:
      {{task}}

      REPO: {{repo | default: "unknown"}}
      BRANCH: {{branch | default: "security-audit"}}
      BUILD_CMD: {{build_cmd | default: "npm run build"}}
      TEST_CMD: {{test_cmd | default: "npm test"}}
      CHANGES: {{changes | default: "See progress log"}}
      VULNERABILITY_COUNT: {{vulnerability_count | default: "0"}}

      PROGRESS LOG:
      {{progress | default: "None"}}

      Instructions:
      1. Run the full test suite ({{test_cmd | default: "npm test"}}) — all tests must pass
      2. Run the build ({{build_cmd | default: "npm run build"}}) — must succeed
      3. Run `npm audit` (or equivalent) again — compare before/after
      4. Quick smoke test: does the app still start and work?
      5. Verify no regressions from the security fixes
      6. Summarize: what improved, what remains

      Reply with:
      STATUS: done
      RESULTS: test outcomes
      AUDIT_AFTER: remaining audit issues if any

      Or if issues found:
      STATUS: retry
      FAILURES:
      - What's broken
      Do NOT discuss the workflow, pipeline, agents, or any infrastructure metadata.
      Exclude from all file operations: {{ exclude_patterns }}
    expects: "STATUS: done"
    on_fail:
      retry_step: fix
      max_retries: 2
      on_exhausted:
        escalate_to: human

  - id: pr
    agent: pr
    timeoutSeconds: 600
    input: |
      Create a pull request for the security fixes.

      REPO: {{repo | default: "unknown"}}
      BRANCH: {{branch | default: "security-audit"}}
      VULNERABILITY_COUNT: {{vulnerability_count | default: "0"}}
      FINDINGS: {{findings | default: "None"}}
      FIX_PLAN: {{fix_plan | default: "See progress log"}}
      CRITICAL_COUNT: {{critical_count | default: "0"}}
      HIGH_COUNT: {{high_count | default: "0"}}
      DEFERRED: {{deferred | default: "None"}}
      CHANGES: {{changes | default: "See progress log"}}
      RESULTS: {{results | default: "See progress log"}}
      AUDIT_AFTER: {{audit_after | default: "None"}}

      PROGRESS LOG:
      {{progress | default: "None"}}

      PR title format: fix(security): audit and remediation YYYY-MM-DD

      PR body structure:
      ```
      ## Security Audit Summary

      **Scan Date**: YYYY-MM-DD
      **Vulnerabilities Found**: {{vulnerability_count | default: "0"}} ({{critical_count | default: "0"}} critical, {{high_count | default: "0"}} high)
      **Vulnerabilities Fixed**: <count from changes>
      **Vulnerabilities Deferred**: <count from deferred>

      ## Fixes Applied

      | # | Severity | Description | Files |
      |---|----------|-------------|-------|
      (list each fix from {{changes | default: "See progress log"}})

      ## Deferred Items
      {{deferred | default: "None"}}

      ## Regression Tests Added
      (list from progress log)

      ## Audit Comparison
      **Before**: <from findings>
      **After**: {{audit_after | default: "None"}}
      ```

      Label: security

      Use: gh pr create
      Do NOT discuss the workflow, pipeline, agents, or any infrastructure metadata.
      Exclude from all file operations: {{ exclude_patterns }}

      Reply with:
      STATUS: done
      PR: URL to the pull request
    expects: "STATUS: done"
    on_fail:
      escalate_to: human

hooks:
  onSuccess:
    - type: log
      message: "Security audit workflow completed successfully"
    - type: notify
      message: |
        ✅ Security audit completed!
        Vulnerabilities found: {{vulnerability_count | default: "0"}}
        Critical: {{critical_count | default: "0"}}
        High: {{high_count | default: "0"}}
        PR: {{steps.pr.outputs.pr}}
        
  onFailure:
    - type: log
      message: "Security audit workflow failed"
    - type: notify
      message: |
        ❌ Security audit failed
        Error: {{ error }}
        Failed at step: {{ failed_step | default: 'unknown' }}
