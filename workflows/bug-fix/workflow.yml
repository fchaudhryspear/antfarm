# Ralph loop (https://github.com/snarktank/ralph) — fresh context per agent session
id: bug-fix
name: Bug Triage & Fix
version: 2
description: |
  Bug fix pipeline with intelligent agent routing and automated quality assurance.
  Triager analyzes reports and reproduces issues (Orion_Architect - system context).
  Investigator traces root cause (Simon_Backend - code analysis).
  Setup creates branch and establishes baseline (NexDev - deployment).
  Fixer implements fix with regression tests (Simon_Backend - implementation).
  Verifier confirms correctness (Harvey_Legal + Lana_QA - compliance + quality).
  PR agent creates pull request (Ross_Mentor/Reviewer - code gating).

  # Workflow Intelligence Tags
  tags:
    - bug-fix
    - triage
    - regression-testing
    - compliance-verification
    - code-quality
  # Recommended for:
  recommended_when:
    - task_contains: ["bug", "defect", "error", "issue", "fix", "broken", "not working"]
    - avoids: ["feature", "enhancement", "new", "ui", "ux", "design"]
    - severity: ["critical", "high", "medium", "low"]
    - estimated_time: ["<1h", "1-4h", "4-8h", ">8h"]

context:
  repo_path: ""          # REQUIRED: --repo-path=/path/to/repo
  repo_name: ""          # REQUIRED: --context repo_name=my-project
  branch: "bugfix/auto"
  build_cmd: "npm run build 2>/dev/null || python -m py_compile **/*.py 2>/dev/null || true"
  test_cmd: "npm test --passWithNoTests 2>/dev/null || pytest -x -q 2>/dev/null || true"
  exclude_patterns: "_build_artifacts,node_modules,vendor,.venv,__pycache__,dist,build,.next,.git"

acceptance_criteria:
  - "Triager reproduces the bug and classifies severity"
  - "Investigator identifies root cause with specific file/line references"
  - "Fixer implements targeted fix with regression test"
  - "Verifier confirms fix addresses root cause, not just symptom"
  - "PR includes bug description, root cause, fix details, and regression test"
  - "No files modified outside repo boundary"

polling:
  model: ollama-cloud/glm-5:cloud
  timeoutSeconds: 3600

agents:
  - id: triager
    name: Triager
    role: analysis
    model: ollama-cloud/glm-5:cloud
    description: Analyzes bug reports, reproduces issues, classifies severity.
    workspace:
      baseDir: agents/triager
      files:
        AGENTS.md: agents/triager/AGENTS.md
        SOUL.md: agents/triager/SOUL.md
        IDENTITY.md: agents/triager/IDENTITY.md

  - id: investigator
    name: Investigator
    role: analysis
    model: ollama-cloud/kimi-k2.5:cloud
    description: Traces bugs to root cause and proposes fix approach.
    workspace:
      baseDir: agents/investigator
      files:
        AGENTS.md: agents/investigator/AGENTS.md
        SOUL.md: agents/investigator/SOUL.md
        IDENTITY.md: agents/investigator/IDENTITY.md

  - id: setup
    name: Setup
    role: coding
    model: ollama-cloud/kimi-k2.5:cloud
    description: Creates bugfix branch and establishes baseline.
    workspace:
      baseDir: agents/setup
      files:
        AGENTS.md: agents/setup/AGENTS.md

  - id: fixer
    name: Fixer
    role: coding
    model: ollama-cloud/kimi-k2.5:cloud
    description: Implements the fix and writes regression tests.
    workspace:
      baseDir: agents/fixer
      files:
        AGENTS.md: agents/fixer/AGENTS.md
        SOUL.md: agents/fixer/SOUL.md
        IDENTITY.md: agents/fixer/IDENTITY.md

  - id: verifier
    name: Verifier
    role: verification
    model: ollama-cloud/glm-5:cloud
    description: Verifies the fix and regression test correctness.
    workspace:
      baseDir: agents/verifier
      files:
        AGENTS.md: agents/verifier/AGENTS.md

  - id: pr
    name: PR Creator
    role: pr
    model: ollama-cloud/minimax-m2.7:cloud
    description: Creates a pull request with bug fix details.
    workspace:
      baseDir: agents/pr
      files:
        AGENTS.md: agents/pr/AGENTS.md

steps:
  - id: triage
    agent: triager
    timeoutSeconds: 1800
    input: |
      Triage the following bug report. Explore the codebase, reproduce the issue, and classify severity.

      BUG REPORT:
      {{task}}

      Instructions:
      1. Read the bug report carefully
      2. Explore the codebase to find the affected area
      3. Attempt to reproduce: run tests, check for failing cases, read error logs/stack traces
      4. Classify severity (critical/high/medium/low)
      5. Document findings

      Do NOT discuss the workflow, pipeline, agents, or any infrastructure metadata.
      Exclude from all file operations: {{ exclude_patterns }}

      Reply with:
      STATUS: done
      REPO: /path/to/repo
      BRANCH: bugfix-branch-name
      SEVERITY: critical|high|medium|low
      AFFECTED_AREA: what files/modules are affected
      REPRODUCTION: how to reproduce the bug
      PROBLEM_STATEMENT: clear description of what's wrong
    expects: "STATUS: done"
    max_retries: 2
    on_fail:
      escalate_to: human

  - id: investigate
    agent: investigator
    timeoutSeconds: 1800
    input: |
      Investigate the root cause of this bug.

      BUG REPORT:
      {{task}}

      REPO: {{repo | default: "unknown"}}
      SEVERITY: {{severity | default: "unknown"}}
      AFFECTED_AREA: {{affected_area | default: "unknown"}}
      REPRODUCTION: {{reproduction | default: "none"}}
      PROBLEM_STATEMENT: {{problem_statement | default: "see task"}}

      Instructions:
      1. Read the code in the affected area
      2. Trace the bug to its root cause
      3. Document exactly what's wrong and why
      4. Propose a fix approach

      Do NOT discuss the workflow, pipeline, agents, or any infrastructure metadata.
      Exclude from all file operations: {{ exclude_patterns }}

      Reply with:
      STATUS: done
      ROOT_CAUSE: detailed explanation of the root cause
      FIX_APPROACH: what needs to change and where
    expects: "STATUS: done"
    max_retries: 2
    on_fail:
      escalate_to: human

  - id: setup
    agent: setup
    timeoutSeconds: 1800
    input: |
      Prepare the environment for the bugfix.

      REPO: {{repo | default: "unknown"}}
      BRANCH: {{branch | default: "bugfix"}}

      Instructions:
      1. cd into the repo
      2. Create the bugfix branch (git checkout -b {{branch}} from main)
      3. Read package.json, CI config, test config to understand build/test setup
      4. Ensure .gitignore exists — if missing, create one appropriate for the detected stack (must include .env, node_modules/, *.key, *.pem at minimum)
      5. Run the build to establish a baseline
      6. Run the tests to establish a baseline

      Do NOT discuss the workflow, pipeline, agents, or any infrastructure metadata.
      Exclude from all file operations: {{ exclude_patterns }}

      Reply with:
      STATUS: done
      BUILD_CMD: {{build_cmd | default: "npm run build"}}
      TEST_CMD: {{test_cmd | default: "npm test"}}
      BASELINE: {{baseline | default: "unknown"}}
    expects: "STATUS: done"
    max_retries: 2
    on_fail:
      escalate_to: human

  - id: fix
    agent: fixer
    timeoutSeconds: 1800
    input: |
      Implement the bug fix.

      BUG REPORT:
      {{task}}

      REPO: {{repo | default: "unknown"}}
      BRANCH: {{branch | default: "bugfix"}}
      BUILD_CMD: {{build_cmd | default: "npm run build"}}
      TEST_CMD: {{test_cmd | default: "npm test"}}
      AFFECTED_AREA: {{affected_area | default: "unknown"}}
      ROOT_CAUSE: {{root_cause | default: "see task"}}
      FIX_APPROACH: {{fix_approach | default: "see task"}}
      PROBLEM_STATEMENT: {{problem_statement | default: "see task"}}

      Instructions:
      1. cd into the repo, checkout the branch
      2. Implement the fix based on the root cause and fix approach
      3. Write a regression test that would have caught this bug
      4. Run {{build_cmd}} to verify the build passes
      5. Run {{test_cmd}} to verify all tests pass
      6. Commit: fix: brief description of the fix

      Do NOT discuss the workflow, pipeline, agents, or any infrastructure metadata.
      Exclude from all file operations: {{ exclude_patterns }}

      Reply with:
      STATUS: done
      CHANGES: what was changed
      REGRESSION_TEST: what test was added
    expects: "STATUS: done"
    max_retries: 2
    on_fail:
      escalate_to: human

  - id: verify
    agent: verifier
    timeoutSeconds: 1800
    input: |
      Verify the bug fix is correct and complete.

      BUG REPORT:
      {{task}}

      REPO: {{repo | default: "unknown"}}
      BRANCH: {{branch | default: "bugfix"}}
      TEST_CMD: {{test_cmd | default: "npm test"}}
      CHANGES: {{changes | default: "see fix step"}}
      REGRESSION_TEST: {{regression_test | default: "see fix step"}}
      ROOT_CAUSE: {{root_cause | default: "see task"}}
      PROBLEM_STATEMENT: {{problem_statement | default: "see task"}}

      Instructions:
      1. Run the full test suite with {{test_cmd}}
      2. Confirm the regression test exists and tests the right thing
      3. Review the fix to confirm it addresses the root cause
      4. Check for unintended side effects
      5. Verify the regression test would fail without the fix (review the diff logic)

      MANDATORY first step:
      - Run `git diff main..{{branch}} --stat` and `git diff main..{{branch}}`
      - If the diff is empty or only contains trivial changes (version bumps, lockfiles), REJECT immediately
      - Compare the diff against CHANGES claimed above — if they don't match, REJECT

      Bug-fix specific checks:
      - The regression test MUST test the specific bug scenario (not just a generic test)
      - The regression test assertions must fail if the fix were reverted
      - The fix should be minimal and targeted — not a refactor disguised as a bugfix
      - Check that the fix addresses the ROOT CAUSE, not just a symptom
      - All changes must be to files INSIDE the repo — not external workspace files

      Do NOT discuss the workflow, pipeline, agents, or any infrastructure metadata.
      Exclude from all file operations: {{ exclude_patterns }}

      Reply with:
      STATUS: done
      VERIFIED: what was confirmed

      Or if issues found:
      STATUS: retry
      ISSUES:
      - What's wrong or incomplete
    expects: "STATUS: done"
    on_fail:
      retry_step: fix
      max_retries: 3
      on_exhausted:
        escalate_to: human

  - id: pr
    agent: pr
    timeoutSeconds: 1800
    input: |
      Create a pull request for the bug fix.

      REPO: {{repo | default: "unknown"}}
      BRANCH: {{branch | default: "bugfix"}}
      PROBLEM_STATEMENT: {{problem_statement | default: "see task"}}
      SEVERITY: {{severity | default: "unknown"}}
      ROOT_CAUSE: {{root_cause | default: "see task"}}
      CHANGES: {{changes | default: "see fix step"}}
      REGRESSION_TEST: {{regression_test | default: "see fix step"}}
      VERIFIED: {{verified | default: "see fix step"}}

      PR title format: fix: brief description of what was fixed

      PR body structure:
      ```
      ## Bug Description
      {{problem_statement}}

      **Severity:** {{severity}}

      ## Root Cause
      {{root_cause}}

      ## Fix
      {{changes}}

      ## Regression Test
      {{regression_test}}

      ## Verification
      {{verified}}
      ```

      Use: gh pr create

      Do NOT discuss the workflow, pipeline, agents, or any infrastructure metadata.
      Exclude from all file operations: {{ exclude_patterns }}

      Reply with:
      STATUS: done
      PR: URL to the pull request
    expects: "STATUS: done"
    on_fail:
      escalate_to: human

hooks:
  onSuccess:
    - type: log
      message: "Bug fix workflow completed successfully"
    - type: notify
      message: |
        ✅ Bug fix completed!
        PR: {{steps.pr.outputs.pr}}
        Severity: {{steps.triage.outputs.triage | default: 'unknown'}}

  onFailure:
    - type: log
      message: "Bug fix workflow failed"
    - type: notify
      message: |
        ❌ Bug fix failed
        Error: {{ error }}
        Failed at step: {{ failed_step | default: 'unknown' }}


